spring.application.name=learningSpringBootApp

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/springbootpractise
spring.datasource.username=root
spring.datasource.password=Tushar123@

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL init
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# Server
server.servlet.context-path=/api/v1

jwt.secretKey=${JWT_SECRET}
#jwt.secretKey=Jrjhgjhrgjrhjrhithiuthuihtuh5iuhguuhuh5iughiuhgigkjhthgt56565hhg

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

























